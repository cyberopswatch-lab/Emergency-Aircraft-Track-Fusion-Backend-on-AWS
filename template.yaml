AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  Serverless aircraft track fusion backend prototype for sparse-sensor search-and-rescue tracking.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Architectures:
      - x86_64
    Tracing: Active
    Environment:
      Variables:
        TRACKS_TABLE: !Ref TracksTable
        OBSERVATIONS_TABLE: !Ref ObservationsTable
        EVENT_BUS_NAME: !Ref TrackEventBus

Parameters:
  StageName:
    Type: String
    Default: dev
    AllowedPattern: '^[a-z0-9-]+$'

Resources:
  ObservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trackId
          AttributeType: S
        - AttributeName: observationTs
          AttributeType: S
      KeySchema:
        - AttributeName: trackId
          KeyType: HASH
        - AttributeName: observationTs
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  TracksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trackId
          AttributeType: S
      KeySchema:
        - AttributeName: trackId
          KeyType: HASH

  TrackEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub aircraft-track-fusion-${StageName}

  FusionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/fusion/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TracksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ObservationsTable
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref TrackEventBus

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/api/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TracksTable
        - DynamoDBReadPolicy:
            TableName: !Ref ObservationsTable
      Events:
        GetTracks:
          Type: Api
          Properties:
            Path: /tracks
            Method: get
        GetTrack:
          Type: Api
          Properties:
            Path: /tracks/{trackId}
            Method: get
        GetHealth:
          Type: Api
          Properties:
            Path: /health
            Method: get

  IngestRuleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/ingest/
      Handler: app.lambda_handler
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref FusionFunction
      Environment:
        Variables:
          FUSION_FUNCTION_NAME: !Ref FusionFunction

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  TracksTableName:
    Value: !Ref TracksTable
  ObservationsTableName:
    Value: !Ref ObservationsTable
  EventBusName:
    Value: !Ref TrackEventBus
